# Codemagic 壳仓库 (build-carrier) 配置文件
# 环境变量 CODE_URL / CHAT_ID / BUILD_TARGET 每次构建通过 API 动态注入

workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        CODE_URL: "PLACEHOLDER"
        APP_NAME: "PLACEHOLDER"
        CHAT_ID: "PLACEHOLDER"
        BUILD_TARGET: "apk"
      node: 20
      java: 17
    scripts:
      - name: Download and extract source
        script: |
          echo "Downloading source..."
          curl -fSL "$CODE_URL" -o /tmp/source.zip
          ls -lh /tmp/source.zip
          unzip -o /tmp/source.zip -d $CM_BUILD_DIR
          test -f "$CM_BUILD_DIR/package.json" || { echo "FATAL: package.json missing"; exit 1; }
          echo "Source ready."

      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR
          npm install

      - name: Prepare Expo config
        script: |
          cd $CM_BUILD_DIR
          node -e "
          const fs = require('fs');
          const raw = fs.readFileSync('app.json', 'utf8');
          const config = JSON.parse(raw);
          const expo = config.expo || config;
          // Ensure android.package exists for prebuild
          if (!expo.android) expo.android = {};
          if (!expo.android.package) {
            const slug = (expo.slug || 'app').replace(/[^a-zA-Z0-9]/g, '');
            expo.android.package = 'com.mgx.' + slug.toLowerCase();
            console.log('Injected android.package:', expo.android.package);
          } else {
            console.log('android.package already set:', expo.android.package);
          }
          // Ensure ios.bundleIdentifier for future iOS support
          if (!expo.ios) expo.ios = {};
          if (!expo.ios.bundleIdentifier) {
            expo.ios.bundleIdentifier = expo.android.package;
          }
          fs.writeFileSync('app.json', JSON.stringify(config, null, 2));
          "

      - name: Expo prebuild
        script: |
          cd $CM_BUILD_DIR
          ./node_modules/.bin/expo prebuild --platform android --no-install

      - name: Build APK
        script: |
          cd $CM_BUILD_DIR/android
          if [ "$BUILD_TARGET" = "aab" ]; then
            ./gradlew bundleRelease
          else
            ./gradlew assembleRelease
          fi

    artifacts:
      - $CM_BUILD_DIR/android/app/build/outputs/**/*.apk
      - $CM_BUILD_DIR/android/app/build/outputs/**/*.aab
