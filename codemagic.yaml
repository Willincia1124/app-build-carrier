# Codemagic 壳仓库 (build-carrier) 配置文件模板
# 此文件应放在 build-carrier 仓库中，不提交到 metagptx-backend
# 环境变量 CODE_URL / CHAT_ID / BUILD_TARGET 每次构建通过 API 动态注入

workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        CODE_URL: "PLACEHOLDER"
        APP_NAME: "PLACEHOLDER"
        CHAT_ID: "PLACEHOLDER"
        BUILD_TARGET: "apk"
      node: 20
      java: 17
    scripts:
      - name: Download and extract source
        script: |
          echo "Downloading source from COS..."
          echo "CODE_URL=$CODE_URL"
          curl -sL -f "$CODE_URL" -o /tmp/source.zip
          echo "Download exit code: $?"
          echo "Zip file size: $(wc -c < /tmp/source.zip) bytes"
          unzip -o /tmp/source.zip -d $CM_BUILD_DIR
          echo "=== Files in CM_BUILD_DIR ==="
          ls -la $CM_BUILD_DIR
          echo "=== Checking package.json ==="
          if [ -f "$CM_BUILD_DIR/package.json" ]; then
            echo "package.json found!"
            head -5 $CM_BUILD_DIR/package.json
          else
            echo "ERROR: package.json NOT FOUND in $CM_BUILD_DIR"
            echo "=== Listing all files recursively (depth 2) ==="
            find $CM_BUILD_DIR -maxdepth 2 -type f | head -30
          fi

      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR
          # Remove builder-level packageManager constraint that blocks pnpm
          if [ -f /Users/builder/package.json ]; then
            node -e "const p=require('/Users/builder/package.json'); delete p.packageManager; require('fs').writeFileSync('/Users/builder/package.json', JSON.stringify(p,null,2))"
          fi
          npm install -g pnpm --force
          # Expo/Metro requires hoisted node_modules (flat structure)
          echo "node-linker=hoisted" >> .npmrc
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild
        script: |
          cd $CM_BUILD_DIR
          ./node_modules/.bin/expo prebuild --platform android --no-install

      - name: Build APK
        script: |
          cd $CM_BUILD_DIR/android
          if [ "$BUILD_TARGET" = "aab" ]; then
            ./gradlew bundleRelease
          else
            ./gradlew assembleRelease
          fi

    artifacts:
      - $CM_BUILD_DIR/android/app/build/outputs/**/*.apk
      - $CM_BUILD_DIR/android/app/build/outputs/**/*.aab
